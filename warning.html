<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Scanner</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0a112c, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 460px;
  background: #0f172a;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

h1 { text-align:center; color:#ef4444; }
.center { text-align:center; }
.warning { font-size: 50px; text-align:center; }

.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 5px;
  overflow: hidden;
}

.fill { height: 100%; transition: 0.5s; }
.section { margin-top: 15px; }

.url {
  background: #020617;
  padding: 10px;
  border-radius: 5px;
  word-break: break-all;
  color: #93c5fd;
}

button {
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.back { background:red; color:white; }
.continue { background:green; color:white; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="card">

<div class="warning">⚠️</div>
<h1>Suspicious Link Detected</h1>

<div id="score" class="center"></div>
<!-- <div id="ai" class="center"></div> -->

<!-- <div class="section">
<b>Threat Type:</b>
<ul id="threats"></ul>
</div> -->

<div class="section">
<b>Why this is dangerous:</b>
<p id="explain"></p>
</div>

<button id="toggleBtn">Show Details</button>

<div id="details" class="hidden">
  <div class="section">
    <b>Detected Issues:</b>
    <ul id="issues"></ul>
  </div>
</div>

<div class="section">
<div class="bar"><div id="fill" class="fill"></div></div>
</div>

<div class="section">
<b>Original URL:</b>
<div id="url" class="url"></div>
</div>

<div class="center">
<button class="back">Go Back</button>
<button class="continue">Continue</button>
</div>

</div>

<script src="analyzer.js"></script>
<script src="warning-view.js"></script>

</body>
</html>
